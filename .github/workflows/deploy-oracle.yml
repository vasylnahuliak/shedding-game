name: Deploy (Oracle VM)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-oracle-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.ORACLE_VM_HOST }}
          SSH_USER: ${{ secrets.ORACLE_VM_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
          ORACLE_PRODUCTION_ENV: ${{ secrets.ORACLE_PRODUCTION_ENV }}
        run: |
          set -euo pipefail

          if [[ -z "${SSH_HOST:-}" || -z "${SSH_USER:-}" || -z "${SSH_PRIVATE_KEY:-}" ]]; then
            echo "Missing required secrets: ORACLE_VM_HOST, ORACLE_VM_USER, ORACLE_VM_SSH_KEY" >&2
            exit 1
          fi

          if [[ -z "${ORACLE_PRODUCTION_ENV:-}" ]]; then
            echo "Missing required secret: ORACLE_PRODUCTION_ENV (contents of deploy/oracle/env/production.env)" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "$SSH_PRIVATE_KEY" > ~/.ssh/oracle_vm_key
          chmod 600 ~/.ssh/oracle_vm_key

          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          tmp_env_file="$(mktemp)"
          chmod 600 "$tmp_env_file"
          printf '%s' "$ORACLE_PRODUCTION_ENV" > "$tmp_env_file"

          ssh -i ~/.ssh/oracle_vm_key -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" 'bash -lc "
            set -euo pipefail
            mkdir -p ~/shedding-game/deploy/oracle/env
          "'

          scp -i ~/.ssh/oracle_vm_key -o IdentitiesOnly=yes \
            "$tmp_env_file" \
            "$SSH_USER@$SSH_HOST:~/shedding-game/deploy/oracle/env/production.env"

          ssh -i ~/.ssh/oracle_vm_key -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" 'bash -lc "
            set -euo pipefail
            cd ~/shedding-game
            git fetch origin main
            git reset --hard origin/main
            deploy/oracle/compose-env.sh up -d --build
          "'
