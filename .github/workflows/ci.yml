name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  turbo-checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint and typecheck
        run: npx turbo run lint typecheck --affected

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check code formatting
        run: npm run format:check

      - name: Run i18n guardrail
        run: npm run i18n:check

      - name: Run jscpd
        run: npm run cpd

      - name: Run Knip
        run: npm run unused
